name: Build & Deploy

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  LDFLAGS_BASE: "-s -w"
  LDFLAGS_PKG: "github.com/fabgoodvibes/owlrun/internal/buildinfo"

jobs:
  build:
    name: Build (${{ matrix.network }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        network: [beta, production]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || echo "::warning::govulncheck found vulnerabilities — review output above"

      - name: Set ldflags
        id: flags
        run: |
          VER="${{ github.ref_name }}"
          NET="${{ matrix.network }}"
          echo "ldflags=${LDFLAGS_BASE} -X ${LDFLAGS_PKG}.Version=${VER} -X ${LDFLAGS_PKG}.Network=${NET}" >> "$GITHUB_OUTPUT"

      - name: Build — Windows amd64
        run: |
          mkdir -p dist
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags='${{ steps.flags.outputs.ldflags }}' \
            -o dist/owlrun-windows-amd64.exe ./cmd/owlrun

      - name: Build — Linux amd64
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags='${{ steps.flags.outputs.ldflags }}' \
            -o dist/owlrun-linux-amd64 ./cmd/owlrun

      - name: Build — Linux arm64
        run: |
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 \
            go build -ldflags='${{ steps.flags.outputs.ldflags }}' \
            -o dist/owlrun-linux-arm64 ./cmd/owlrun

      - name: Build — macOS amd64 (Intel)
        run: |
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags='${{ steps.flags.outputs.ldflags }}' \
            -o dist/owlrun-darwin-amd64 ./cmd/owlrun

      - name: Build — macOS arm64 (Apple Silicon)
        run: |
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 \
            go build -ldflags='${{ steps.flags.outputs.ldflags }}' \
            -o dist/owlrun-darwin-arm64 ./cmd/owlrun

      - name: Generate checksums
        run: |
          cd dist
          sha256sum owlrun-windows-amd64.exe owlrun-linux-amd64 owlrun-linux-arm64 \
            owlrun-darwin-amd64 owlrun-darwin-arm64 > checksums.txt
          cat checksums.txt

      # Deploy dev channel (beta network, dev branch only)
      - name: Deploy dev to CDN
        if: matrix.network == 'beta' && github.ref == 'refs/heads/dev'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: |
            pages deploy pages --project-name=owlrun-cdn --branch=dev
          preCommands: |
            mkdir -p pages/download/beta/dev
            cp dist/* pages/download/beta/dev/
            cp installer/install.sh pages/install.sh
            cp installer/install.ps1 pages/install.ps1

      # Deploy main channel (beta network, tags only)
      - name: Deploy beta to CDN
        if: matrix.network == 'beta' && startsWith(github.ref, 'refs/tags/v')
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: |
            pages deploy pages --project-name=owlrun-cdn --branch=main
          preCommands: |
            TAG="${{ github.ref_name }}"
            mkdir -p pages/download/beta/${TAG}
            mkdir -p pages/download/beta/latest
            cp dist/* pages/download/beta/${TAG}/
            cp dist/* pages/download/beta/latest/
            cp installer/install.sh pages/install.sh
            cp installer/install.ps1 pages/install.ps1
